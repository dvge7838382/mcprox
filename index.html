<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Rooms - Proximity Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #6b8fa3; 
            font-family: 'Press Start 2P', cursive; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            color: #000;
        }
        .menu { 
            width: 500px; 
            background: #c6c6c6; 
            border: 6px solid #000; 
            padding: 25px; 
            text-align: center; 
            box-shadow: inset -4px -4px #555, inset 4px 4px #fff; 
        }
        h3, h4 { margin-top: 0; text-shadow: 2px 2px #fff; }
        input { 
            width: 90%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 4px solid #000; 
            font-family: 'Press Start 2P', cursive; 
            font-size: 12px; 
            outline: none;
        }
        .button { 
            background: #c6c6c6; 
            border: 4px solid #000; 
            padding: 15px; 
            cursor: pointer; 
            display: inline-block;
            width: 80%;
            box-shadow: inset -3px -3px #555, inset 3px 3px #fff; 
            font-size: 12px; 
            margin-top: 5px;
        }
        .button:active { box-shadow: inset 3px 3px #555, inset -3px -3px #fff; }
        .button:hover { background: #b0b0b0; }
        .hidden { display: none !important; }
        #status2 { font-size: 10px; margin-top: 20px; color: #d32f2f; }
        .player-entry { 
            padding: 10px; 
            border-bottom: 3px solid #888; 
            font-size: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            background: #e0e0e0;
            margin-bottom: 5px;
        }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: #4caf50; border: 2px solid #000; }
    </style>
</head>
<body>

<div class="menu" id="mainMenu">
    <h3>VC ROOMS</h3>
    <input id="ignInput" placeholder="MINECRAFT NAME">
    <input id="roomCodeInput" placeholder="12-DIGIT CODE">
    <div class="button" onclick="joinRoom()">JOIN SESSION</div>
    <div id="status"></div>
</div>

<div class="menu hidden" id="roomMenu">
    <h3 id="roomTitle">ROOM: ---</h3>
    <h4>ONLINE PLAYERS:</h4>
    <div id="playerList"></div>
    <div class="button" onclick="location.reload()" style="margin-top: 20px; background: #e57373;">LEAVE</div>
    <div id="status2">🎙 INITIALIZING MIC...</div>
</div>

<script>
const SERVER = "wss://minecraft-bedrock-prox-chat.onrender.com";
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

let ws = null, stream = null, mediaRecorder = null, myIgn = "";

function base64ToArrayBuffer(base64) {
    const binary = atob(base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return bytes.buffer;
}

function arrayBufferToBase64(buffer) {
    let binary = "";
    const bytes = new Uint8Array(buffer);
    for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
    return btoa(binary);
}

async function playProxAudio(base64Data, volume) {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const buffer = base64ToArrayBuffer(base64Data);
    const audioBuffer = await audioCtx.decodeAudioData(buffer).catch(() => null);
    if (!audioBuffer) return;

    const source = audioCtx.createBufferSource();
    const gainNode = audioCtx.createGain();

    source.buffer = audioBuffer;
    gainNode.gain.value = volume; // Set by Tracker App!

    source.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    source.start();
}

async function joinRoom() {
    const ign = document.getElementById("ignInput").value.trim();
    const roomId = document.getElementById("roomCodeInput").value.trim();
    if (!ign || !roomId) return alert("Enter Name and Code!");

    myIgn = ign;
    ws = new WebSocket(SERVER);

    ws.onopen = () => {
        ws.send(JSON.stringify({ type: "join", ign, roomId }));
        document.getElementById("mainMenu").classList.add("hidden");
        document.getElementById("roomMenu").classList.remove("hidden");
        document.getElementById("roomTitle").innerText = "ROOM: " + roomId;
        startMic();
    };

    ws.onmessage = async (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === "players") updatePlayerList(msg.players);
        if (msg.type === "audio") {
            playProxAudio(msg.data, msg.volume);
        }
    };
}
