<!DOCTYPE html>
<html>
<head>
    <title>PROX_ZERO_STUTTER</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        .box { border: 1px solid #0f0; padding: 20px; display: inline-block; }
        .hidden { display: none; }
        .bar { height: 4px; background: #0f0; width: 0%; transition: 0.05s; }
    </style>
</head>
<body>

<div id="login" class="box">
    <input id="ign" placeholder="USERNAME">
    <input id="room" placeholder="ROOM CODE">
    <button onclick="boot()">START</button>
</div>

<div id="ui" class="box hidden">
    <div id="p-list"></div>
    <button id="fix" class="hidden" onclick="audioCtx.resume(); this.hidden=true;">CLICK TO ENABLE SOUND</button>
</div>

<script>
    const URL = window.location.origin.replace(/^http/, 'ws');
    let ws, myName, audioCtx, nextPlayTime = 0;
    let pGains = {};

    async function boot() {
        myName = document.getElementById('ign').value.trim();
        ws = new WebSocket(URL);
        ws.binaryType = "arraybuffer";

        ws.onopen = () => {
            ws.send(JSON.stringify({ type: 'join', ign: myName, roomId: document.getElementById('room').value }));
            document.getElementById('login').classList.add('hidden');
            document.getElementById('ui').classList.remove('hidden');
            startProMic();
        };

        ws.onmessage = (e) => {
            if (e.data instanceof ArrayBuffer) {
                handleAudioStream(e.data);
            } else {
                const m = JSON.parse(e.data);
                if(m.type === 'players') render(m.players);
                if(m.type === 'vol_update') m.rules.forEach(r => update(r));
            }
        };
    }

    async function startProMic() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ latencyHint: 'interactive' });
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const source = audioCtx.createMediaStreamSource(stream);
        
        // Grab tiny 1024 sample chunks (~23ms of audio)
        const processor = audioCtx.createScriptProcessor(1024, 1, 1);
        source.connect(processor);
        processor.connect(audioCtx.destination);

        processor.onaudioprocess = (e) => {
            const input = e.inputBuffer.getChannelData(0);
            // Convert to 16-bit Int to save 50% bandwidth
            const output = new Int16Array(input.length);
            for (let i = 0; i < input.length; i++) {
                output[i] = Math.max(-1, Math.min(1, input[i])) * 0x7FFF;
            }
            if (ws.readyState === 1) ws.send(output.buffer);
        };
    }

    function handleAudioStream(buffer) {
        if (audioCtx.state === 'suspended') { document.getElementById('fix').hidden = false; return; }

        const view = new DataView(buffer);
        const vol = view.getFloat32(0, true);
        const rawAudio = new Int16Array(buffer.slice(4));

        // Convert back to Float32 for Web Audio
        const floatData = new Float32Array(rawAudio.length);
        for (let i = 0; i < rawAudio.length; i++) floatData[i] = rawAudio[i] / 0x7FFF;

        const audioBuf = audioCtx.createBuffer(1, floatData.length, audioCtx.sampleRate);
        audioBuf.getChannelData(0).set(floatData);

        const source = audioCtx.createBufferSource();
        source.buffer = audioBuf;

        // --- THE STUTTER FIX: SCHEDULING ---
        // If we fall behind, catch up to the current time
        const currentTime = audioCtx.currentTime;
        if (nextPlayTime < currentTime) nextPlayTime = currentTime + 0.01;

        const gain = audioCtx.createGain();
        gain.gain.setTargetAtTime(vol, nextPlayTime, 0.01);
        
        source.connect(gain).connect(audioCtx.destination);
        source.start(nextPlayTime);

        // Advance the clock by the duration of the chunk
        nextPlayTime += audioBuf.duration;
    }

    function render(list) {
        document.getElementById('p-list').innerHTML = list.map(p => `
            <div>${p} <div id="bar-${p}" class="bar"></div></div>
        `).join('');
    }

    function update(r) {
        const target = (r.a === myName) ? r.b : (r.b === myName ? r.a : null);
        const el = document.getElementById(`bar-${target}`);
        if(el) el.style.width = (r.v * 100) + "%";
    }
</script>
</body>
</html>
