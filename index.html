<!DOCTYPE html>
<html>
<head>
    <title>MC Proximity</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { background: #222; font-family: 'Press Start 2P', cursive; color: #fff; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .box { background: #c6c6c6; border: 4px solid #000; padding: 20px; width: 400px; color: #000; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 3px solid #000; font-family: 'Press Start 2P'; font-size: 10px; }
        button { width: 95%; background: #555; color: #fff; padding: 10px; border: 3px solid #000; cursor: pointer; font-family: 'Press Start 2P'; }
        .player-card { background: #999; border: 2px solid #000; margin: 5px 0; padding: 10px; text-align: left; }
        .bar-bg { width: 100%; height: 10px; background: #444; border: 1px solid #000; margin-top: 5px; }
        .bar-fill { height: 100%; background: #0f0; width: 0%; transition: 0.2s; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="login" class="box">
        <h3>VC LOGIN</h3>
        <input id="ign" placeholder="MC NAME">
        <input id="room" placeholder="ROOM CODE">
        <button onclick="start()">CONNECT</button>
    </div>

    <div id="ui" class="box hidden">
        <h4 id="rm-id">ROOM: ---</h4>
        <div id="mixer"></div>
        <p id="mic-status" style="color:red; font-size:10px;">MIC: OFF</p>
    </div>

<script>
    const URL = "wss://your-app-name.onrender.com"; // CHANGE THIS
    let ws, myName, ctx;

    async function start() {
        myName = document.getElementById('ign').value.trim();
        const code = document.getElementById('room').value.trim();
        ws = new WebSocket(URL);
        ws.onopen = () => {
            ws.send(JSON.stringify({ type: 'join', ign: myName, roomId: code }));
            document.getElementById('login').classList.add('hidden');
            document.getElementById('ui').classList.remove('hidden');
            document.getElementById('rm-id').innerText = "ROOM: " + code;
            initMic();
        };
        ws.onmessage = (e) => {
            const m = JSON.parse(e.data);
            if(m.type === 'players') updateMixer(m.players);
            if(m.type === 'audio') play(m.data, m.volume, m.from);
        };
    }

    function updateMixer(list) {
        document.getElementById('mixer').innerHTML = list.map(p => `
            <div class="player-card">
                <div>${p} ${p===myName?'(YOU)':''}</div>
                ${p!==myName?`<div class="bar-bg"><div id="fill-${p}" class="bar-fill"></div></div><div id="txt-${p}" style="font-size:8px">VOL: 0%</div>`:''}
            </div>`).join('');
    }

    async function initMic() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const rec = new MediaRecorder(stream);
        rec.ondataavailable = (e) => {
            if(ws.readyState === 1) {
                const fr = new FileReader();
                fr.onload = () => ws.send(JSON.stringify({ type: 'audio', data: fr.result.split(',')[1] }));
                fr.readAsDataURL(e.data);
            }
        };
        rec.start(200);
        document.getElementById('mic-status').innerText = "MIC: ACTIVE";
        document.getElementById('mic-status').style.color = "green";
    }

    async function play(data, vol, from) {
        if(!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        if(ctx.state === 'suspended') await ctx.resume();
        const buf = await ctx.decodeAudioData(Uint8Array.from(atob(data), c => c.charCodeAt(0)).buffer);
        const src = ctx.createBufferSource();
        const gain = ctx.createGain();
        src.buffer = buf;
        gain.gain.value = vol;
        src.connect(gain); gain.connect(ctx.destination);
        src.start(0);
        
        // Update the visual bar
        const fill = document.getElementById(`fill-${from}`);
        const txt = document.getElementById(`txt-${from}`);
        if(fill) {
            fill.style.width = (vol*100) + "%";
            txt.innerText = "VOL: " + Math.round(vol*100) + "%";
        }
    }
</script>
</body>
</html>
