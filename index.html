/* Inside your <script> tag */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

async function playSpatialAudio(base64, vol) {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    
    // Decode and Play
    const arrayBuf = Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
    const audioBuf = await audioCtx.decodeAudioData(arrayBuf).catch(() => null);
    if (!audioBuf) return;

    const source = audioCtx.createBufferSource();
    const gainNode = audioCtx.createGain();

    source.buffer = audioBuf;
    gainNode.gain.value = vol; // Regulated by Server/Tracker!

    source.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    source.start();
}

// When receiving from server
ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'audio') {
        playSpatialAudio(msg.data, msg.volume);
    }
};
