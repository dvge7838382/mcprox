<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MC Prox VC</title>
    <style>
        body { background: #111; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding-top: 50px; }
        .main-box { background: #222; border: 2px solid #0f0; padding: 30px; display: inline-block; border-radius: 10px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px; width: 200px; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        .hidden { display: none; }
        .player-row { border-bottom: 1px solid #333; padding: 10px; text-align: left; }
        .vol-meter { height: 5px; background: #0f0; width: 0%; transition: width 0.1s; }
    </style>
</head>
<body>

    <div id="login" class="main-box">
        <h2>VOICE TERMINAL</h2>
        <input id="ign" placeholder="MC NAME"> <br>
        <input id="room" placeholder="12-DIGIT CODE"> <br>
        <button onclick="start()">INITIALIZE</button>
    </div>

    <div id="vc-interface" class="main-box hidden">
        <h3 id="room-tag">ROOM: ---</h3>
        <div id="list" style="width: 300px;"></div>
        <br>
        <button id="wake-btn" class="hidden" onclick="wakeAudio()" style="background: red; color: white;">CLICK TO FIX AUDIO</button>
    </div>

    <script>
        const WS_URL = window.location.origin.replace(/^http/, 'ws');
        let ws, myName, audioCtx;
        let gains = {};

        async function start() {
            myName = document.getElementById('ign').value.trim();
            const rId = document.getElementById('room').value.trim();
            if(!myName || !rId) return alert("Fill fields!");

            ws = new WebSocket(WS_URL);
            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'join', ign: myName, roomId: rId }));
                document.getElementById('login').classList.add('hidden');
                document.getElementById('vc-interface').classList.remove('hidden');
                document.getElementById('room-tag').innerText = "ROOM: " + rId;
                initMic();
            };

            ws.onmessage = async (e) => {
                const m = JSON.parse(e.data);
                if(m.type === 'players') {
                    const list = document.getElementById('list');
                    list.innerHTML = m.players.map(p => `
                        <div class="player-row">
                            ${p} ${p === myName ? '(YOU)' : ''}
                            <div id="meter-${p}" class="vol-meter"></div>
                        </div>
                    `).join('');
                }
                if(m.type === 'vol_update') {
                    m.rules.forEach(r => {
                        const other = r.a === myName ? r.b : (r.b === myName ? r.a : null);
                        if(other) {
                            const bar = document.getElementById(`meter-${other}`);
                            if(bar) bar.style.width = (r.v * 100) + "%";
                        }
                    });
                }
                if(m.type === 'audio') playAudio(m.data, m.volume, m.from);
            };
        }

        async function initMic() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const rec = new MediaRecorder(stream);
                rec.ondataavailable = (e) => {
                    if(ws.readyState === 1 && e.data.size > 0) {
                        const reader = new FileReader();
                        reader.onload = () => ws.send(JSON.stringify({ type: 'audio', data: reader.result.split(',')[1] }));
                        reader.readAsDataURL(e.data);
                    }
                };
                rec.start(250);
            } catch(e) { alert("Mic Error: Use HTTPS."); }
        }

        function wakeAudio() {
            if(audioCtx) audioCtx.resume();
            document.getElementById('wake-btn').classList.add('hidden');
        }

        async function playAudio(data, vol, from) {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') {
                document.getElementById('wake-btn').classList.remove('hidden');
                return;
            }

            const buf = await (await fetch(`data:audio/wav;base64,${data}`)).arrayBuffer();
            audioCtx.decodeAudioData(buf, (b) => {
                const s = audioCtx.createBufferSource();
                if(!gains[from]) {
                    gains[from] = audioCtx.createGain();
                    gains[from].connect(audioCtx.destination);
                }
                s.buffer = b;
                gains[from].gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
                s.connect(gains[from]);
                s.start(0);
            });
        }
    </script>
</body>
</html>
