<script>
    // 1. YOUR RENDER URL (MAKE SURE THIS IS CORRECT)
    const RENDER_URL = "wss://your-app-name.onrender.com"; 

    let ws, myName, audioCtx;

    // 2. THE CONNECT FUNCTION
    async function start() {
        console.log("Connect button clicked!");
        
        myName = document.getElementById('ign').value.trim();
        const code = document.getElementById('room').value.trim();

        if (!myName || !code) {
            alert("Please enter both your Name and the 12-digit Room Code!");
            return;
        }

        try {
            // Initialize WebSocket
            ws = new WebSocket(RENDER_URL);

            ws.onopen = () => {
                console.log("Connected to Server!");
                ws.send(JSON.stringify({ type: 'join', ign: myName, roomId: code }));
                
                // Switch UI Screens
                document.getElementById('login').classList.add('hidden');
                document.getElementById('ui').classList.remove('hidden');
                document.getElementById('rm-id').innerText = "ROOM: " + code;
                
                initMic();
            };

            ws.onmessage = (e) => {
                const m = JSON.parse(e.data);
                if (m.type === 'players') updateMixer(m.players);
                if (m.type === 'audio') play(m.data, m.volume, m.from);
            };

            ws.onerror = (err) => {
                console.error("WebSocket Error:", err);
                alert("Failed to connect to the Render server. Check your URL!");
            };

        } catch (error) {
            console.error("Startup Error:", error);
            alert("Error starting connection: " + error.message);
        }
    }

    // 3. UI MIXER UPDATE
    function updateMixer(list) {
        const mixer = document.getElementById('mixer');
        mixer.innerHTML = list.map(p => `
            <div class="player-card">
                <div style="display:flex; justify-content:space-between;">
                    <span>${p} ${p === myName ? '(YOU)' : ''}</span>
                    <span>${p === myName ? '🎤' : '🔊'}</span>
                </div>
                ${p !== myName ? `
                    <div class="bar-bg"><div id="fill-${p}" class="bar-fill"></div></div>
                    <div id="txt-${p}" style="font-size:8px; margin-top:5px;">VOL: 0%</div>
                ` : ''}
            </div>`).join('');
    }

    // 4. MICROPHONE LOGIC
    async function initMic() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const rec = new MediaRecorder(stream);
            
            rec.ondataavailable = (e) => {
                if (ws && ws.readyState === 1 && e.data.size > 0) {
                    const reader = new FileReader();
                    reader.onload = () => {
                        const base64 = reader.result.split(',')[1];
                        ws.send(JSON.stringify({ type: 'audio', data: base64 }));
                    };
                    reader.readAsDataURL(e.data);
                }
            };
            rec.start(200);
            document.getElementById('mic-status').innerText = "MIC: ACTIVE";
            document.getElementById('mic-status').style.color = "green";
        } catch (err) {
            alert("Microphone access denied! Make sure you use HTTPS.");
        }
    }

    // 5. AUDIO PLAYBACK
    async function play(data, vol, from) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        try {
            const arrayBuf = Uint8Array.from(atob(data), c => c.charCodeAt(0)).buffer;
            audioCtx.decodeAudioData(arrayBuf, (buffer) => {
                const src = audioCtx.createBufferSource();
                const gain = audioCtx.createGain();
                src.buffer = buffer;
                gain.gain.value = vol;
                src.connect(gain);
                gain.connect(audioCtx.destination);
                src.start(0);

                // Visual Feedback
                const fill = document.getElementById(\`fill-\${from}\`);
                const txt = document.getElementById(\`txt-\${from}\`);
                if (fill && txt) {
                    const pct = Math.round(vol * 100);
                    fill.style.width = pct + "%";
                    txt.innerText = "VOL: " + pct + "%";
                }
            });
        } catch (e) { /* Ignore minor artifacts */ }
    }
</script>
